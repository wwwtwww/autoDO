name: Build Android APK

# 触发条件：当代码推送到 master 或 main 分支时自动触发，或者允许您在 Actions 页面手动点击运行
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 下载代码 (Checkout)
        uses: actions/checkout@v4

      - name: 配置 Java 环境 (Set up JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 使用自带的 Gradle 编译 APK
        run: gradle assembleDebug

      - name: 提取打包好的 APK 文件并提供下载链接
        uses: actions/upload-artifact@v4
        with:
          name: LarkAutoClock-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
