name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 配置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置兼容的 Gradle 版本 (8.4)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true

      - name: 缓存 Debug 签名文件以保持包签名一致
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-${{ runner.os }}

      - name: 运行单元测试
        run: gradle testDebugUnitTest --stacktrace

      - name: 上传测试结果报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Unit-Test-Results
          path: app/build/reports/tests/testDebugUnitTest/

      - name: 编译 APK 并保存日志
        run: gradle assembleDebug --stacktrace --info > build_log.txt 2>&1 || (cat build_log.txt && exit 1)

      - name: 上传打包好的 APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: autoDO-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 上传错误日志 (供排查)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Gradle-Error-Log
          path: build_log.txt
